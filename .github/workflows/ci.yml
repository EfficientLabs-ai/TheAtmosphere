name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  proof:
    name: offline seal proof · node ${{ matrix.node }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    defaults:
      run:
        working-directory: node-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # The offline proof needs ONLY the audited PQC library — not the native DHT
      # transport — so it verifies the trust core on every OS without a build step.
      - run: npm install @noble/post-quantum@^0.6.1
      - run: node verify.mjs
